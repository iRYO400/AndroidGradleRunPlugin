# Plugin version
pluginVersion=0.5.1a

# Android Studio build target = the lowest supported version (Ladybug 2024.2.1 Patch 3).
# Building against the floor ensures only stable APIs are used → forward-compatible with Meerkat/Panda/Quail.
platformVersion=2024.2.1.12

# Compatibility range: Ladybug (Oct 2024) → Quail Canary
pluginSinceBuild=242
pluginUntilBuild=261.*

# Gradle JVM args
org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configuration-cache=true

# Kotlin
kotlin.stdlib.default.dependency=false

# ── Local development ──────────────────────────────────────────────────────────
# Path to your locally installed Android Studio for runIde task.
# Set this to use your real Android Studio instead of downloading a sandbox.
# Format on macOS: /Applications/Android Studio.app/Contents
# (Copy from: right-click Android Studio in Finder → Show Package Contents → Contents)
#
# localAndroidStudioPath=/Applications/Android Studio.app/Contents
